<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Sin conexión — Polyfauna</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px; background: #0a0a0a; color: #ececec; font-family: Inter, system-ui, sans-serif; text-align: center; }
      main { max-width: 420px; }
      img { width: 72px; height: 72px; margin-bottom: 24px; }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0 0 24px; color: #8a8a8a; line-height: 1.55; }
      button { appearance: none; border: 1px solid #343434; border-radius: 12px; background: #ececec; color: #0a0a0a; padding: 12px 20px; font-weight: 750; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="Polyfauna" />
      <h1>Estás fuera de frecuencia</h1>
      <p>No hay conexión en este momento. Cuando vuelva la señal podrás acceder al contenido actualizado.</p>
      <button type="button" onclick="location.reload()">Intentar de nuevo</button>
    </main>
  </body>
</html>
